services:
  scicalc-mcp:
    build:
      context: ./Scientific-computing-MCP
      dockerfile: Dockerfile
    image: scicalc-mcp:latest
    container_name: scicalc-mcp
    restart: unless-stopped
    # 不再对公网直接暴露 8000，只在容器内部网络供 Caddy 访问。
    expose:
      - "8000"
    environment:
      # 远程部署使用 HTTP 传输，监听 8000 端口。
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
    healthcheck:
      # MCP 的 /mcp 端点对普通请求会返回 4xx，这里只探测端口是否在监听。
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8000)); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  kiro-gateway:
    build:
      context: ./Scientific-computing-MCP/kiro_gateway
      dockerfile: Dockerfile
    image: kiro-gateway:latest
    container_name: kiro-gateway
    restart: unless-stopped
    expose:
      - "9000"
    environment:
      # Kiro headless 认证所需的 API Key（从 .env 注入，勿硬编码）。
      KIRO_API_KEY: ${KIRO_API_KEY}
      # 网关自身的访问令牌，安卓 app 用它做 Bearer 鉴权。
      GATEWAY_TOKEN: ${GATEWAY_TOKEN}
      # 单次执行超时（秒）。
      KIRO_TIMEOUT: "180"
    volumes:
      # 挂载 Kiro CLI 的 MCP 配置，使其能调用内部的 scicalc-mcp 服务。
      - ./Scientific-computing-MCP/kiro_gateway/kiro-mcp.json:/root/.kiro/settings/mcp.json:ro
    depends_on:
      - scicalc-mcp

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      # Caddy 对外提供 HTTP(80) 与 HTTPS(443)。80 用于 Let's Encrypt 证书验证。
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # 持久化证书，避免每次重建都重新申请（有频率限制）。
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - scicalc-mcp
      - kiro-gateway

volumes:
  caddy_data:
  caddy_config:
